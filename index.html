<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <meta name="robots" content="noindex">

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQIDoF_qk01ioPp4dNMCxgvVukf6Gnm16ZITJtr33pao5Q5PBVZPFDxxYh4rJ2NG2r35C-WzH2w27rV/pub?gid=0&single=true&output=csv";

    async function redirect() {
      try {
        const response = await fetch(SHEET_CSV_URL + "&cachebust=" + Date.now());
        const text = await response.text();

        const lines = text.trim().split("\n");
        const url = lines[1].trim();

        if (url && url.startsWith("https://")) {
          window.location.replace(url);
        } else {
          document.body.innerHTML = "Redirect link is missing or invalid.";
        }
      } catch (error) {
        document.body.innerHTML = "Redirect could not be loaded.";
      }
    }

    redirect();
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
